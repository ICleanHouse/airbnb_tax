<!-- @dsCard group="Brand" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
.ico{display:grid;place-items:center;gap:6px;}
.ico .lucide{width:24px;height:24px;color:var(--ink);stroke-width:2;}
.ico span{font-size:11px;color:var(--muted);}
.iconrow{display:grid;grid-template-columns:repeat(7,1fr);gap:16px;}
</style></head><body>
<div class="card" style="gap:14px;">
  <div class="iconrow">
    <div class="ico"><i data-lucide="home"></i><span>home</span></div>
    <div class="ico"><i data-lucide="map-pin"></i><span>map-pin</span></div>
    <div class="ico"><i data-lucide="calendar"></i><span>calendar</span></div>
    <div class="ico"><i data-lucide="user-plus"></i><span>user-plus</span></div>
    <div class="ico"><i data-lucide="shield-check"></i><span>shield</span></div>
    <div class="ico"><i data-lucide="send"></i><span>send</span></div>
    <div class="ico"><i data-lucide="bell"></i><span>bell</span></div>
    <div class="ico"><i data-lucide="car"></i><span>car</span></div>
    <div class="ico"><i data-lucide="message-square"></i><span>message</span></div>
    <div class="ico"><i data-lucide="layout-dashboard"></i><span>dashboard</span></div>
    <div class="ico"><i data-lucide="log-in"></i><span>log-in</span></div>
    <div class="ico"><i data-lucide="x"></i><span>close</span></div>
    <div class="ico"><i data-lucide="check"></i><span>check</span></div>
    <div class="ico"><i data-lucide="star"></i><span>star</span></div>
  </div>
  <span class="ds-meta">Lucide, 2px stroke, currentColor. The one icon family across the product — no emoji, no mixed sets.</span>
</div>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
</body></html>
