<!-- @dsCard group="Brand" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
body{font-family:var(--font-sans);}
.lockup{display:inline-flex;align-items:center;gap:12px;}
.word{font-weight:650;font-size:23px;letter-spacing:-0.025em;color:var(--ink);}
.dark{background:var(--ink);padding:13px 18px;border-radius:12px;}
.dark .word{color:#fff;}
.fav{display:flex;align-items:center;gap:14px;}
</style></head><body>
<div class="card" style="gap:16px;">
  <div class="row" style="gap:26px;">
    <span class="lockup">
      <img src="../assets/mark.svg" width="38" height="38" alt="">
      <span class="word">Host Cleaners</span>
    </span>
    <span class="dark"><span class="lockup">
      <img src="../assets/mark.svg" width="34" height="34" alt="">
      <span class="word">Host Cleaners</span>
    </span></span>
    <span class="fav">
      <img src="../assets/mark.svg" width="32" height="32" alt="">
      <img src="../assets/mark.svg" width="20" height="20" alt="">
      <img src="../assets/mark.svg" width="16" height="16" alt="">
    </span>
  </div>
  <span class="ds-meta">A sparkling-clean home — house mark with a sparkle, in the coral app tile. Original to Host Cleaners, distinct from Airbnb. Wordmark: Geist 650, tight tracking. Same mark doubles as the favicon.</span>
</div>
</body></html>
