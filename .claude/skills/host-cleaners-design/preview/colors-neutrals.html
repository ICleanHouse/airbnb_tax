<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="card">
  <div class="swatch-grid" style="--cols:6;">
    <div class="col"><div class="swatch" style="background:#f7f4ee;border:1px solid var(--line);"></div><span class="tok-name">Canvas</span><span class="tok-val">#f7f4ee</span></div>
    <div class="col"><div class="swatch" style="background:#f1ece3;border:1px solid var(--line);"></div><span class="tok-name">Canvas 2</span><span class="tok-val">#f1ece3</span></div>
    <div class="col"><div class="swatch" style="background:#ffffff;border:1px solid var(--line);"></div><span class="tok-name">Surface</span><span class="tok-val">#ffffff</span></div>
    <div class="col"><div class="swatch" style="background:#dddddd;"></div><span class="tok-name">Line</span><span class="tok-val">#dddddd</span></div>
    <div class="col"><div class="swatch" style="background:#222222;"></div><span class="tok-name">Text</span><span class="tok-val">#222222</span></div>
    <div class="col"><div class="swatch" style="background:#111111;"></div><span class="tok-name">Ink</span><span class="tok-val">#111111</span></div>
  </div>
  <span class="ds-meta">Warm ecru canvas (brand direction) over crisp white surfaces. Muted #6a6a6a for secondary text.</span>
</div>
</body></html>
