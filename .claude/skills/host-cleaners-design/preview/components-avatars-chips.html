<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
.chip{display:inline-flex;align-items:center;gap:5px;border-radius:999px;background:var(--header-highlight);color:var(--text);font-size:13px;font-weight:600;padding:7px 13px;}
.chip .dot{color:var(--muted);}
.av{display:grid;place-items:center;width:44px;height:44px;border-radius:50%;background:var(--teal-tint);color:var(--teal);font-weight:600;}
.avc{display:grid;place-items:center;width:34px;height:34px;border-radius:50%;background:var(--brand);color:#fff;}
.avc .lucide{width:18px;height:18px;}
</style></head><body>
<div class="card">
  <div class="row" style="gap:14px;">
    <span class="avc"><i data-lucide="home"></i></span>
    <span class="av">MD</span>
    <span class="chip">Maria <span class="dot">·</span> Cleaner</span>
    <span class="chip">Sofia</span>
  </div>
  <span class="ds-meta">Avatars: coral brand mark, teal-tinted initials. User chips carry name · role with a muted dot divider.</span>
</div>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
</body></html>
