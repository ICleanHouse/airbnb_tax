<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
/* The one filled action — kept as a pill */
.btn{display:inline-flex;min-height:48px;align-items:center;justify-content:center;gap:8px;border-radius:999px;cursor:pointer;font-weight:600;font-size:15px;padding:0 20px;border:0;font-family:inherit;}
.btn-primary{background:var(--brand);color:#fff;}
.btn .lucide{width:18px;height:18px;}
/* Text buttons — standalone, no box; underline grows on hover */
.btn-text{display:inline-flex;align-items:center;gap:7px;white-space:nowrap;background:transparent;border:0;padding:4px 2px;cursor:pointer;font-family:inherit;font-weight:600;font-size:15px;color:var(--ink);border-bottom:2px solid transparent;transition:border-color var(--dur-fast) var(--ease);}
.btn-text:hover,.btn-text.hover{border-bottom-color:currentColor;}
.btn-text--brand{color:var(--brand);}
.btn-text .lucide{width:17px;height:17px;}
</style></head><body>
<div class="card">
  <div class="row" style="gap:24px;">
    <button class="btn btn-primary"><i data-lucide="send"></i>Send offer</button>
    <button class="btn-text">Cancel</button>
    <button class="btn-text">Review applicants</button>
    <button class="btn-text btn-text--brand hover">Log in</button>
  </div>
  <span class="ds-meta">One filled pill for the single decisive action. Everything else is standalone text — no box — with a 2px underline that grows in on hover (shown at right).</span>
</div>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
</body></html>
