<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
.fld{display:grid;gap:8px;}
.fld span{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-0.01em;}
.fld input{min-height:52px;width:100%;border:1px solid transparent;border-radius:999px;background:rgba(17,17,17,0.035);color:var(--ink);padding:0 20px;font-family:inherit;font-size:15px;outline:0;transition:background var(--dur) var(--ease),border-color var(--dur) var(--ease),box-shadow var(--dur) var(--ease);}
.fld input::placeholder{color:var(--muted);}
.fld input:hover{background:rgba(17,17,17,0.06);}
.fld input.focus{background:#fff;border-color:var(--brand);box-shadow:0 0 0 4px rgba(255,56,92,0.12);}
</style></head><body>
<div class="card">
  <div class="row" style="gap:16px;align-items:flex-end;">
    <label class="fld" style="flex:1;"><span>Email</span><input value="cleaner@example.bg"></label>
    <label class="fld" style="flex:1;"><span>City</span><input class="focus" value="Sofia"></label>
  </div>
  <span class="ds-meta">Pill fields with an almost-transparent fill (3.5% ink) — no border at rest, 52px tall. Hover deepens the wash; focus lifts to white with a coral ring.</span>
</div>
</body></html>
