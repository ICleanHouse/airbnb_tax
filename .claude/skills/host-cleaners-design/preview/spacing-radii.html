<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="card">
  <div class="row" style="gap:18px;align-items:flex-end;">
    <div class="col" style="align-items:center;gap:6px;"><div style="width:64px;height:48px;background:var(--surface);border:1px solid var(--line);border-radius:8px;"></div><span class="tok-val">8 · input/btn</span></div>
    <div class="col" style="align-items:center;gap:6px;"><div style="width:64px;height:48px;background:var(--surface);border:1px solid var(--line);border-radius:14px;"></div><span class="tok-val">14 · card</span></div>
    <div class="col" style="align-items:center;gap:6px;"><div style="width:64px;height:48px;background:var(--surface);border:1px solid var(--line);border-radius:16px;"></div><span class="tok-val">16 · modal</span></div>
    <div class="col" style="align-items:center;gap:6px;"><div style="width:64px;height:48px;background:var(--surface);border:1px solid var(--line);border-radius:999px;"></div><span class="tok-val">999 · pill</span></div>
  </div>
  <span class="ds-meta">Radii climb with surface size. Buttons, tabs, chips & badges are fully rounded pills.</span>
</div>
</body></html>
