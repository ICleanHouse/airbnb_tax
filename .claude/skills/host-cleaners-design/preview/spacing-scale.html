<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="card">
  <div class="row" style="gap:10px;align-items:flex-end;">
    <div class="col" style="align-items:center;gap:4px;"><div style="width:4px;height:4px;background:var(--brand);"></div><span class="tok-val">4</span></div>
    <div class="col" style="align-items:center;gap:4px;"><div style="width:8px;height:8px;background:var(--brand);"></div><span class="tok-val">8</span></div>
    <div class="col" style="align-items:center;gap:4px;"><div style="width:12px;height:12px;background:var(--brand);"></div><span class="tok-val">12</span></div>
    <div class="col" style="align-items:center;gap:4px;"><div style="width:16px;height:16px;background:var(--brand);"></div><span class="tok-val">16</span></div>
    <div class="col" style="align-items:center;gap:4px;"><div style="width:24px;height:24px;background:var(--brand);"></div><span class="tok-val">24</span></div>
    <div class="col" style="align-items:center;gap:4px;"><div style="width:32px;height:32px;background:var(--brand);"></div><span class="tok-val">32</span></div>
  </div>
  <span class="ds-meta">4-based spacing. Card padding 16, modal padding 20–24, page gutters clamp(16–40px).</span>
</div>
</body></html>
