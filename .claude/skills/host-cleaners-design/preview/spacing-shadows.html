<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="card" style="background:var(--canvas);">
  <div class="row" style="gap:26px;">
    <div class="col" style="align-items:center;gap:8px;"><div style="width:80px;height:52px;background:#fff;border-radius:12px;box-shadow:var(--shadow-xs);"></div><span class="tok-val">xs · controls</span></div>
    <div class="col" style="align-items:center;gap:8px;"><div style="width:80px;height:52px;background:#fff;border-radius:12px;box-shadow:var(--shadow-card);"></div><span class="tok-val">card hover</span></div>
    <div class="col" style="align-items:center;gap:8px;"><div style="width:80px;height:52px;background:#fff;border-radius:12px;box-shadow:var(--shadow-md);"></div><span class="tok-val">md · panel</span></div>
    <div class="col" style="align-items:center;gap:8px;"><div style="width:80px;height:52px;background:#fff;border-radius:12px;box-shadow:var(--shadow-modal);"></div><span class="tok-val">modal</span></div>
  </div>
  <span class="ds-meta">Soft, diffuse, neutral-black shadows. Elevation only on lift (hover), floating panels & dialogs.</span>
</div>
</body></html>
